<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Sanskrit Acharya</title>
    
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-MKS588RW');</script>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NY73D03BZ2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-NY73D03BZ2');
    </script>

    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        .error-section {
            height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 5%;
        }
        .error-code {
            font-family: 'Cinzel', serif;
            font-size: 8rem;
            line-height: 1;
            color: #d35400;
            margin-bottom: 10px;
            opacity: 0.2;
            position: absolute;
            z-index: -1;
        }
        .error-title {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        .error-message {
            font-size: 1.1rem;
            color: #666;
            max-width: 500px;
            margin-bottom: 35px;
            line-height: 1.6;
        }
        .error-actions {
            display: flex;
            gap: 20px;
        }
    </style>
</head>
<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MKS588RW" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <div class="cursor"></div>
    <div class="preloader" id="preloader"><div class="preloader-content">ॐ</div></div>

    <nav>
        <div class="logo"><a href="/"><img src="LOGOM.png" alt="Sanskrit Acharya Logo" class="nav-logo"></a></div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="courses">Courses</a>
            <a href="contact">Contact</a>
        </div>
    </nav>

    <section class="error-section">
        <div class="error-code reveal">404</div>
        <h1 class="error-title reveal gradient-text">मार्गः न प्राप्तः</h1>
        <h2 class="error-title reveal" style="font-size: 1.5rem; margin-top: -10px;">Page Not Found</h2>
        <p class="error-message reveal delay-1">
            The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
        </p>
        <div class="error-actions reveal delay-2">
            <a href="/" class="btn">Return Home</a>
            <a href="contact" class="btn outline-btn" style="border-color: #d35400; color: #d35400;">Report Issue</a>
        </div>
    </section>

    <footer>
        <div class="footer-bottom">
            <p class="copyright">&copy; 2026 Sanskrit Acharya Online Classes.</p>
        </div>
    </footer>

    <script>
        window.addEventListener('load',()=>setTimeout(()=>{document.getElementById('preloader').style.opacity='0';setTimeout(()=>document.getElementById('preloader').style.display='none',800)},1000));
        const cursor=document.querySelector('.cursor');document.addEventListener('mousemove',e=>{cursor.style.left=e.clientX+'px';cursor.style.top=e.clientY+'px';});
        const obs=new IntersectionObserver((e,o)=>e.forEach(i=>{if(i.isIntersecting){i.target.classList.add('active');o.unobserve(i.target);}}),{threshold:0.15});
        document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
    </script>
</body>
</html>

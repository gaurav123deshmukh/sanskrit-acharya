<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitemap - Sanskrit Acharya</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NY73D03BZ2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-NY73D03BZ2');
    </script>

    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        .sitemap-layout {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        .sitemap-title {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            margin-bottom: 40px;
        }

        .sitemap-links {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sitemap-links li {
            margin: 15px 0;
        }

        .sitemap-links a {
            text-decoration: none;
            color: #333;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .sitemap-links a:hover {
            color: #d35400;
        }
    </style>
</head>
<body>
    <div class="cursor"></div>
    <div class="preloader" id="preloader"><div class="preloader-content">ॐ</div></div>

    <nav>
        <div class="logo"><a href="/"><img src="LOGOM.png" alt="Sanskrit Acharya Logo" class="nav-logo"></a></div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="contact">Contact</a>
        </div>
    </nav>

    <main class="sitemap-layout">
        <h1 class="sitemap-title reveal gradient-text">Sitemap</h1>
        <ul class="sitemap-links reveal delay-1">
            <li><a href="/">Home</a></li>
            <li><a href="courses">Courses</a></li>
            <li><a href="articles">Articles</a></li>
            <li><a href="about">About Us</a></li>
            <li><a href="contact">Contact</a></li>
        </ul>
    </main>

    <script>
        window.addEventListener('load',()=>setTimeout(()=>{document.getElementById('preloader').style.opacity='0';setTimeout(()=>document.getElementById('preloader').style.display='none',800)},1000));
        const cursor=document.querySelector('.cursor');document.addEventListener('mousemove',e=>{cursor.style.left=e.clientX+'px';cursor.style.top=e.clientY+'px';});
        const obs=new IntersectionObserver((e,o)=>e.forEach(i=>{if(i.isIntersecting){i.target.classList.add('active');o.unobserve(i.target);}}),{threshold:0.15});
        document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        .sitemap-container { padding: 100px 10%; min-height: 70vh; }
        .sitemap-list { list-style: none; padding: 0; margin-top: 30px; }
        .sitemap-list li { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .sitemap-list a { 
            text-decoration: none; 
            color: #d35400; 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 500;
            font-size: 1.2rem;
        }
        .sitemap-list a:hover { color: #333; }
    </style>

<body>
    <nav>
        <div class="logo"><a href="/"><img src="LOGOM.png" alt="Sanskrit Acharya Logo" class="nav-logo"></a></div>
    </nav>

    <section class="sitemap-container">
        <h1 class="hero-title gradient-text">Sitemap</h1>
        <ul class="sitemap-list">
            <li><a href="/">Home</a></li>
            <li><a href="courses">Our Sanskrit Courses</a></li>
            <li><a href="articles">Educational Articles</a></li>
            <li><a href="about">About Sanskrit Acharya</a></li>
            <li><a href="contact">Contact & Admissions</a></li>
        </ul>
    </section>

    <footer>
        <div class="footer-bottom">
            <p>&copy; 2026 Sanskrit Acharya Online Classes.</p>
        </div>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Sanskrit Acharya</title>
    
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-MKS588RW');</script>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NY73D03BZ2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-NY73D03BZ2');
    </script>

    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        .thankyou-section {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 5%;
        }
        .thankyou-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #d35400;
        }
        .thankyou-title {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            margin-bottom: 15px;
        }
        .thankyou-message {
            font-size: 1.2rem;
            color: #555;
            max-width: 600px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MKS588RW" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <div class="cursor"></div>
    <div class="preloader" id="preloader"><div class="preloader-content">ॐ</div></div>

    <nav>
        <div class="logo"><a href="/"><img src="LOGOM.png" alt="Sanskrit Acharya Logo" class="nav-logo"></a></div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="courses">Courses</a>
            <a href="about">About Us</a>
            <a href="contact">Contact</a>
        </div>
    </nav>

    <section class="thankyou-section">
        <div class="thankyou-icon reveal">🙏</div>
        <h1 class="thankyou-title reveal gradient-text">धन्यवादः | Thank You</h1>
        <p class="thankyou-message reveal delay-1">
            We have received your admission inquiry. Our team will review your details and reach out to you on your provided contact number shortly.
        </p>
        <div class="reveal delay-2">
            <a href="/" class="btn">Back to Home</a>
        </div>
    </section>

    <footer>
        <div class="footer-bottom">
            <p class="copyright">&copy; 2026 Sanskrit Acharya Online Classes.</p>
        </div>
    </footer>

    <script>
        window.addEventListener('load',()=>setTimeout(()=>{document.getElementById('preloader').style.opacity='0';setTimeout(()=>document.getElementById('preloader').style.display='none',800)},1000));
        const cursor=document.querySelector('.cursor');document.addEventListener('mousemove',e=>{cursor.style.left=e.clientX+'px';cursor.style.top=e.clientY+'px';});
        const obs=new IntersectionObserver((e,o)=>e.forEach(i=>{if(i.isIntersecting){i.target.classList.add('active');o.unobserve(i.target);}}),{threshold:0.15});
        document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
    </script>
</body>
</html>
